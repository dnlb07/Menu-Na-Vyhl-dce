<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Na Vyhlídce</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', serif;
            /* Pozadí nastaveno na průhledné, aby prosvítal Hostinger */
            background: transparent;
            color: #000;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }
        .menu-col { flex: 1; text-align: center; }

        .col-header {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 25px;
            color: #000;
        }

        h2.category {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .menu-item { margin-bottom: 20px; }

        .item-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
            display: block;
        }

        .item-sub {
            font-family: 'Lora', serif;
            font-size: 16px;
            display: block;
        }
        .item-sub.gray { color: #666; } /* Příloha šedě */
        .item-sub.dark { color: #000; } /* Váha černě */

        .item-price {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-top: 5px;
        }
        .loader { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu-col">
        <div class="col-header">Menu tento týden</div>
        <div id="tydenni-container" class="loader">Načítám...</div>
    </div>

    <div class="menu-col">
        <div class="col-header">Dnešní polední menu</div>
        <div id="denni-container" class="loader">Načítám...</div>
    </div>
</div>

<script>
    const urlDenni = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToihWTUNEtB_Weo_gKLbT0aq_JtHOYt6n5q5_DUzfc7Z5P5NFsyHjT_djPiwWMSLEFEptCNR20lWfN/pub?gid=0&single=true&output=csv';
    const urlTydenni = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToihWTUNEtB_Weo_gKLbT0aq_JtHOYt6n5q5_DUzfc7Z5P5NFsyHjT_djPiwWMSLEFEptCNR20lWfN/pub?gid=1864381089&single=true&output=csv';

    async function loadMenu(url, containerId) {
        try {
            const response = await fetch(url);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).slice(1);
            let items = [];

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 5) {
                    items.push({
                        kategorie: cols[0].replace(/"/g, '').trim(),
                        nazev: cols[1].replace(/"/g, '').trim(),
                        priloha: cols[2].replace(/"/g, '').trim(),
                        vaha: cols[3].replace(/"/g, '').trim(),
                        cena: cols[4].replace(/"/g, '').trim()
                    });
                }
            });

            // Logika: Polévky na konec
            items.sort((a, b) => {
                const katA = a.kategorie.toLowerCase();
                const katB = b.kategorie.toLowerCase();
                if (katA.includes("polé") && !katB.includes("polé")) return 1;
                if (!katA.includes("polé") && katB.includes("polé")) return -1;
                return 0;
            });

            let html = "";
            let currentCategory = "";
            items.forEach(item => {
                if (!item.nazev) return;
                if (item.kategorie !== "" && item.kategorie !== currentCategory) {
                    currentCategory = item.kategorie;
                    html += `<h2 class="category">${currentCategory}</h2>`;
                }
                html += `
                    <div class="menu-item">
                        <span class="item-name">${item.nazev}</span>
                        ${item.priloha ? `<span class="item-sub gray">${item.priloha}</span>` : ''}
                        ${item.vaha ? `<span class="item-sub dark">${item.vaha} g</span>` : ''}
                        <span class="item-price">${item.cena} Kč</span>
                    </div>`;
            });

            document.getElementById(containerId).innerHTML = html || "Žádná nabídka.";
        } catch (e) {
            document.getElementById(containerId).innerHTML = "Chyba načítání.";
