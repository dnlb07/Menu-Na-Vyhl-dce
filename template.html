<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Menu Na Vyhlídce</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Playfair Display', serif; background: transparent; color: #000; margin: 0; padding: 10px; }
        .container { display: flex; flex-direction: column; gap: 30px; max-width: 800px; margin: 0 auto; }
        .menu-col { text-align: center; }
        .col-header { font-size: 24px; font-weight: 700; margin-bottom: 20px; text-decoration: underline; text-decoration-color: #d4af37; }
        h2.category { font-size: 18px; margin: 25px 0 10px 0; text-transform: uppercase; }
        .menu-item { margin-bottom: 20px; }
        .item-name { font-size: 18px; font-weight: 700; display: block; }
        .item-sub { font-family: 'Lora', serif; font-size: 16px; display: block; }
        .item-sub.gray { color: #666; }
        .item-price { font-size: 18px; font-weight: 700; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-col">
            <div class="col-header">Dnešní polední menu</div>
            <div id="denni-content">{{DENNI_MENU}}</div>
        </div>
        <div class="menu-col">
            <div class="col-header">Menu tento týden</div>
            <div id="tydenni-content">{{TYDENNI_MENU}}</div>
        </div>
    </div>
</body>
</html>
